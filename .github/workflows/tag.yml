name: Validate and Tag

on:
  pull_request:
    types: [closed]
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_id:
        description: 'Release identifier (e.g. v2026-05-1)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true && startsWith(github.head_ref, 'release/v'))
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.extract-release.outputs.release_id }}
      root_version: ${{ steps.read-versions.outputs.root_version }}
      crypto_version: ${{ steps.read-versions.outputs.crypto_version }}
      encoding_version: ${{ steps.read-versions.outputs.encoding_version }}
    steps:
      # https://github.com/actions/checkout
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Extract and validate release identifier
        id: extract-release
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            RELEASE_ID="${{ inputs.release_id }}"
          else
            RELEASE_ID="${GITHUB_HEAD_REF#release/}"
          fi
          echo "Release identifier: $RELEASE_ID"

          # Branch name is a calendar version (vYYYY-MM-N), not tied to any module's semver.
          if [[ ! "$RELEASE_ID" =~ ^v[0-9]{4}-[0-9]{2}-[0-9]+$ ]]; then
            echo "::error::Release identifier does not match expected format vYYYY-MM-N (got: $RELEASE_ID)"
            exit 1
          fi
          echo "release_id=$RELEASE_ID" >> "$GITHUB_OUTPUT"

      - name: Read module versions
        id: read-versions
        run: |
          ROOT_VERSION="$(cat VERSION | tr -d '[:space:]')"
          CRYPTO_VERSION="$(cat crypto/VERSION | tr -d '[:space:]')"
          ENCODING_VERSION="$(cat encoding/VERSION | tr -d '[:space:]')"
          echo "Root: $ROOT_VERSION | Crypto: $CRYPTO_VERSION | Encoding: $ENCODING_VERSION"
          echo "root_version=$ROOT_VERSION" >> "$GITHUB_OUTPUT"
          echo "crypto_version=$CRYPTO_VERSION" >> "$GITHUB_OUTPUT"
          echo "encoding_version=$ENCODING_VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@93397bea11091df50f3d7e59dc26a7711a8bcfbe # v4.1.0
        with:
          go-version: '1.25'

      - name: lint
        uses: golangci/golangci-lint-action@9fae48acfc02a90574d7c304a1758ef9895495fa # v7.0.1
        with:
          args: ./...
          version: v2.12.2

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v ./...

  tag-and-index:
    runs-on: ubuntu-latest
    needs: build
    environment: Production # require manual approval
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Create tags and GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.TKHQ_DEPLOY_ACCESS_TOKEN }}
        run: |
          ROOT_VERSION="${{ needs.build.outputs.root_version }}"
          CRYPTO_VERSION="${{ needs.build.outputs.crypto_version }}"
          ENCODING_VERSION="${{ needs.build.outputs.encoding_version }}"
          RELEASE_ID="${{ needs.build.outputs.release_id }}"

          create_release() {
            local tag="$1"
            local title="$2"
            if gh release view "$tag" --repo "$GITHUB_REPOSITORY" &>/dev/null 2>&1; then
              echo "Release $tag already exists, skipping"
            else
              gh release create "$tag" --title "$title" --generate-notes
              echo "Created release: $tag"
            fi
          }

          create_release "$ROOT_VERSION"                   "go-sdk $ROOT_VERSION ($RELEASE_ID)"
          create_release "crypto/$CRYPTO_VERSION"          "crypto $CRYPTO_VERSION ($RELEASE_ID)"
          create_release "encoding/$ENCODING_VERSION"      "encoding $ENCODING_VERSION ($RELEASE_ID)"

      - name: Trigger pkg.go.dev updates
        run: |
          ROOT_VERSION="${{ needs.build.outputs.root_version }}"
          CRYPTO_VERSION="${{ needs.build.outputs.crypto_version }}"
          ENCODING_VERSION="${{ needs.build.outputs.encoding_version }}"
          echo "Triggering pkg.go.dev updates..."
          curl -s "https://sum.golang.org/lookup/github.com/tkhq/go-sdk/v2@$ROOT_VERSION"
          curl -s "https://sum.golang.org/lookup/github.com/tkhq/go-sdk/crypto@$CRYPTO_VERSION"
          curl -s "https://sum.golang.org/lookup/github.com/tkhq/go-sdk/encoding@$ENCODING_VERSION"
          echo "All modules released. Packages will be available on pkg.go.dev shortly."
